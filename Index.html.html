<!DOCTYPE html><!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munis Mebel</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background:#111;
    transition:0.5s;
}

header {
    background:gold;
    color:black;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.card {
    background:#222;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:gold;
    margin:5px;
    cursor:pointer;
}

input {
    padding:8px;
    margin:5px;
    width:80%;
    border-radius:8px;
    border:none;
}

a button {
    width:80%;
}
</style>
</head>

<body>

<header id="title">Legacy</header>

<div class="card">
    <h3>🛋️ Ma'lumot</h3>
    <p id="desc">Sifatli mebellar: divan, shkaf, stol</p>
</div>

<div class="card">
    <h3>📞 Aloqa</h3>
    <p id="phone">+998973361601</p>
</div>

<!-- SOCIAL BUTTONS -->
<div class="card">
    <h3>🌐 Bizni kuzating</h3>

    <a id="instaL" href="#"><button>Instagram</button></a>
    <a id="teleL" href="#"><button>Telegram</button></a>
    <a id="ytL" href="#"><button>YouTube</button></a>
    <a id="mailL" href="#"><button>Email</button></a>
</div>

<!-- CALL BUTTON -->
<div class="card">
    <a id="callL" href="tel:+998973361601">
        <button>📞 Telefon orqali bog'lanish</button>
    </a>
</div>

<!-- ADMIN PANEL -->
<div class="card">
    <h3>⚙️ O'zgartirish (Admin)</h3>

    <input id="pass" type="password" placeholder="Parol">
    <br>

    <input id="name" placeholder="Sayt nomi">
    <input id="descIn" placeholder="Matn">
    <input id="phoneIn" placeholder="Telefon">

    <input id="insta" placeholder="Instagram link">
    <input id="tele" placeholder="Telegram link">
    <input id="yt" placeholder="YouTube link">
    <input id="mail" placeholder="Email link">

    <input id="bg" placeholder="Background rangi (masalan #000000)">

    <br>
    <button onclick="save()">💾 Saqlash</button>
</div>

<script>
// DEFAULT DATA
let data = JSON.parse(localStorage.getItem("munis")) || {
    title:"Munis Mebel",
    desc:"Sifatli mebellar: divan, shkaf, stol",
    phone:"+998973361601",
    insta:"#",
    tele:"#",
    yt:"#",
    mail:"#",
    bg:"#111"
};

function render(){
    document.getElementById("title").innerText = data.title;
    document.getElementById("desc").innerText = data.desc;
    document.getElementById("phone").innerText = data.phone;
    document.body.style.background = data.bg;

    document.getElementById("instaL").href = data.insta;
    document.getElementById("teleL").href = data.tele;
    document.getElementById("ytL").href = data.yt;
    document.getElementById("mailL").href = data.mail;
    document.getElementById("callL").href = "tel:" + data.phone;
}

function save(){
    let pass = document.getElementById("pass").value;

    // oddiy himoya parol
    if(pass !== "1234"){
        alert("❌ Parol noto'g'ri!");
        return;
    }

    data.title = document.getElementById("name").value || data.title;
    data.desc = document.getElementById("descIn").value || data.desc;
    data.phone = document.getElementById("phoneIn").value || data.phone;

    data.insta = document.getElementById("insta").value || "#";
    data.tele = document.getElementById("tele").value || "#";
    data.yt = document.getElementById("yt").value || "#";
    data.mail = document.getElementById("mail").value || "#";

    data.bg = document.getElementById("bg").value || data.bg;

    localStorage.setItem("munis", JSON.stringify(data));

    alert("✅ Saqlandi!");
    render();
}

render();
</script>

</body>
</html>html>
